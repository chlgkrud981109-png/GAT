<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 - Versus V2</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <!-- Navigation -->
    <header class="glass-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <i data-lucide="layers" class="logo-icon"></i>
                <span>Versus</span>
            </a>
            <nav class="nav-links">
                <a href="index.html"><i data-lucide="trending-down"></i> 가격 추적</a>
                <a href="bucket.html"><i data-lucide="swords"></i> 마이 배틀</a>
                <a href="community.html"><i data-lucide="calendar"></i> 쇼핑 캘린더</a>
            </nav>
            <div class="auth-wrapper" id="authWrapper" style="margin-left: auto; margin-right: 1rem;">
                <button class="btn btn-primary" id="googleLoginBtn">
                    <i data-lucide="log-in" style="width: 16px; height: 16px;"></i> 구글 로그인
                </button>
            </div>
            <button id="themeToggle" class="theme-toggle" title="테마 변경">
                <i data-lucide="sun" class="sun-icon"></i>
                <i data-lucide="moon" class="moon-icon"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Stub -->
    <main class="container" style="min-height: 60vh; padding: 2rem 0;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <i data-lucide="message-square" style="width: 64px; height: 64px; color: var(--accent-primary); margin-bottom: 1.5rem;"></i>
            <h1 class="gradient-text" style="font-size: 3rem; margin-bottom: 1rem;">유저 커뮤니티</h1>
            <p class="subtitle">제품에 대한 다양한 의견을 나누고 토론할 수 있는 공간입니다.</p>
        </div>
        
        <div class="community-container glass-panel" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
            <!-- Review Input Area -->
            <div id="loginPrompt" style="display:none; text-align:center; padding: 2rem; background: var(--surface); border-radius: 12px; margin-bottom: 2rem; border: 1px dashed var(--border);">
                <i data-lucide="lock" style="width:32px; height:32px; color: var(--text-secondary); margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 0.5rem; color:var(--text); font-weight:600;">로그인이 필요합니다</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">커뮤니티에 의견을 남기려면 메인 페이지에서 구글 로그인을 해주세요.</p>
                <button class="btn btn-primary" onclick="window.location.href='index.html'">메인으로 이동</button>
            </div>
            
            <div id="reviewForm" style="display:none; margin-bottom: 2rem;">
                <textarea id="reviewInput" placeholder="솔직한 리뷰나 제품에 대한 의견을 자유롭게 남겨주세요." style="width: 100%; min-height: 120px; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 1rem; resize: vertical; margin-bottom: 1rem;"></textarea>
                <div style="text-align: right;">
                    <button class="btn btn-primary" id="submitReviewBtn">
                        <i data-lucide="send"></i> 등록하기
                    </button>
                </div>
            </div>
            
            <!-- Reviews List -->
            <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color:var(--text);"><i data-lucide="list"></i> 최신 의견 (실시간)</h3>
            <div id="reviewsList" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="text-align:center; padding: 2rem;"><i data-lucide="loader-2" class="spin"></i> 의견을 불러오는 중...</div>
            </div>
        </div>
    </main>

    <footer class="glass-footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <i data-lucide="layers"></i>
                <span>Versus</span>
            </div>
            <p class="copyright">&copy; 2026 Versus. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase Compat Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="auth.js"></script>
    <!-- Page Logic -->
    <script src="community.js"></script>
    
    <script>lucide.createIcons();</script>
</body>
</html>
