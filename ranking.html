<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인기 랭킹 - Versus V2</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2682811481522162"
     crossorigin="anonymous"></script>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <!-- Navigation -->
    <header class="glass-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <i data-lucide="layers" class="logo-icon"></i>
                <span>Versus</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">제품 비교</a>
                <a href="bucket.html">비교 보관함</a>
                <a href="guide.html">AI 쇼핑 가이드</a>
                <a href="community.html">커뮤니티</a>
            </nav>
            <div class="auth-wrapper" id="authWrapper" style="margin-left: auto; margin-right: 1rem;">
                <button class="btn btn-primary" id="googleLoginBtn">
                    <i data-lucide="log-in" style="width: 16px; height: 16px;"></i> 구글 로그인
                </button>
            </div>
            <button id="themeToggle" class="theme-toggle" title="테마 변경">
                <i data-lucide="sun" class="sun-icon"></i>
                <i data-lucide="moon" class="moon-icon"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Stub -->
    <main class="container" style="min-height: 60vh; padding: 2rem 0; text-align: center;">
        <i data-lucide="bar-chart-2" style="width: 64px; height: 64px; color: var(--accent-primary); margin-bottom: 1.5rem;"></i>
        <h1 class="gradient-text" style="font-size: 3rem; margin-bottom: 1rem;">인기 랭킹 (실시간)</h1>
        <p class="subtitle" style="margin-bottom: 2rem;">가장 많은 유저가 검색하고 비교한 제품들의 순위입니다.</p>
        
        <div class="ranking-container glass-panel" style="max-width: 600px; margin: 0 auto; padding: 2rem; text-align: left;">
            <section id="rankingList" class="product-grid">
                <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1rem; margin: 0;">
                    <li style="text-align:center;"><i data-lucide="loader-2" class="spin"></i> 순위를 집계하고 있습니다...</li>
                </ul>
            </section>
        </div>

        <!-- Footer Ad Banner -->
        <div class="ad-footer-banner">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-2682811481522162"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <footer class="glass-footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <i data-lucide="layers"></i>
                <span>Versus</span>
            </div>
            <p class="copyright">&copy; 2026 Versus. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase Compat Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Page Logic -->
    <script src="ranking.js"></script>
    
    <script>lucide.createIcons();</script>
</body>
</html>
