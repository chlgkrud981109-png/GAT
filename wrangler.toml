name = "versus-product-compare"
compatibility_date = "2024-03-20"
pages_build_output_dir = "."

[vars]
# ⚠️ 주의: 시크릿 키(API_KEY 등)는 wrangler.toml에 직접 넣지 말고 
# Cloudflare Pages 대시보드의 'Environment variables' -> 'Secret'으로 등록하세요.

# 파이어베이스 공개 설정값 (대시보드 대신 여기서 관리하면 편리함)
FB_AUTH_DOMAIN = "your-app.firebaseapp.com"
FB_PROJECT_ID = "your-app-id"
FB_STORAGE_BUCKET = "your-app.appspot.com"
FB_MESSAGING_SENDER_ID = "123456789"
FB_APP_ID = "1:123456789:web:abcdef"
FB_MEASUREMENT_ID = "G-ABCDEF"
